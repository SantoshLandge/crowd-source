server:
  port: 8001

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user/**
              filters:
                - StripPrefix=1
#                - RewritePath=/api/users/?(?<remaining>.*), /v1/users/${remaining}

            - id: event-service
              uri: lb://EVENT-SERVICE
              predicates:
                - Path=/api/v1/event/**
              filters:
                - StripPrefix=1
#                - RewritePath=/api/v1/event/?(?<remaining>.*), /v1/event/${remaining}

            - id: registration-service
              uri: lb://REGISTRATION-SERVICE
              predicates:
                - Path=/api/v1/registration/**
              filters:
                - StripPrefix=1
#                - RewritePath=/api/v1/registration/?(?<remaining>.*), /v1/registration/${remaining}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8002/.well-known/jwks.json
          jws-algorithms: ES256

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway, routes
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.crowdsource.apigateway: DEBUG
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: INFO
    reactor.netty: DEBUG
#    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: DEBUG     # Route loading
#    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: DEBUG  # Path matching
#    org.springframework.cloud.gateway.filter.NettyRoutingFilter: DEBUG           # Backend forwarding
#    org.springframework.cloud.gateway: INFO    # Errors + metrics only (Production)
