server:
  port: 8002

# JWT Secret
jwt:
  private-key:
    path: keys/private.pem
  public-key:
    path: keys/public.pem

spring:
  application:
    name: user-service

  # H2 Database (local dev only)
  datasource:
    url: jdbc:h2:mem:userdb      # In-memory H2
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate  # Liquibase manages schema!
    show-sql: false              # See SQL in logs
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  liquibase:
    change-log: classpath:liquibase/changelog-master.xml
    enabled: true

  sql:
    init:
      mode: always

  # Enable Spring Security DEBUG (shows filter chain execution)
  security:
    debug: true  # CRITICAL - shows exact filter execution order


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always


# Enable DEBUG logging for critical Spring Security components
logging:
  level:
    com.crowdsource.userservice.security: DEBUG  # Your JWT filter & CustomUserDetails
    org.springframework.security: DEBUG          # Full SecurityContext flow
    org.springframework.security.web: DEBUG      # Filter chain
    org.springframework.security.web.FilterChainProxy: DEBUG
    root: INFO  # Keep everything else INFO

