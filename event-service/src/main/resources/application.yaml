server:
  port: 8003

spring:
  application:
    name: event-service

  # H2 Database (local dev only)
  datasource:
    url: jdbc:h2:mem:eventdb      # In-memory H2
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8002/.well-known/jwks.json
          jws-algorithms: ES256

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always